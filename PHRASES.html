<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Néerlandais Pro — VR</title>
<style>
:root {
  --bg: #0d0f14;
  --panel: #13161f;
  --card-bg: #1a1e2a;
  --border: #252a38;
  --text: #e8ecf5;
  --muted: #7a85a0;
  --hint: #3a4055;
  --accent: #4d9fff;
  --accent-dim: #1a3a6a;
  --green: #3ecf8e;
  --green-dim: #0e3325;
  --red: #f06060;
  --red-dim: #3a1010;
  --cat-active: #4d9fff;
  --cat-active-bg: #0e2240;
  --shadow: 0 8px 40px rgba(0,0,0,0.6);
  --radius: 20px;
}
 
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  padding: 2rem 1.5rem 3rem;
  -webkit-font-smoothing: antialiased;
}

.wrap { max-width: 860px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
.logo { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
.logo span { color: var(--accent); }
.header-right { display: flex; gap: 10px; }
.hbtn { font-size: 13px; padding: 7px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--panel); color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.hbtn:hover { color: var(--text); border-color: var(--muted); }
.hbtn.on { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-dim); }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.stat { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.25rem; text-align: center; }
.stat-n { font-size: 26px; font-weight: 700; letter-spacing: -1px; }
.stat-n.g { color: var(--green); }
.stat-n.r { color: var(--red); }
.stat-n.w { color: var(--text); }
.stat-l { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: 0.05em; text-transform: uppercase; }

/* Persist */
.persist { display: flex; gap: 10px; margin-bottom: 1.5rem; }
.pbtn { flex: 1; font-size: 12px; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--panel); color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; text-align: center; }
.pbtn:hover { color: var(--text); }

/* Modes */
.modes { display: flex; gap: 10px; margin-bottom: 1.5rem; }
.mbtn { flex: 1; font-size: 13px; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--panel); color: var(--muted); cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.15s; }
.mbtn.on { background: #1c2235; color: var(--text); border-color: #3a4260; }

/* Cats */
.cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.cbtn { font-size: 12px; padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--panel); color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.cbtn:hover { color: var(--text); }
.cbtn.on { background: var(--cat-active-bg); color: var(--cat-active); border-color: var(--accent-dim); font-weight: 600; }

/* Progress */
.prog-wrap { margin-bottom: 1.5rem; }
.prog-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
.prog-lbl { font-size: 11px; color: var(--hint); margin-top: 6px; text-align: right; }

/* Hard banner */
.hdbanner { display: none; background: var(--red-dim); border: 1px solid var(--red); border-radius: 12px; padding: 9px 16px; font-size: 13px; color: var(--red); text-align: center; margin-bottom: 1.25rem; }
.hdbanner.on { display: block; }

/* ═══ VR CARD — large, readable at distance ═══ */
.card {
  background: var(--card-bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 3rem 2.5rem;
  min-height: 280px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  margin-bottom: 1rem;
  user-select: none;
  transition: border-color 0.2s, background 0.2s;
}
.card:hover { border-color: #3a4260; }
.card.ok { border-color: var(--green); background: var(--green-dim); }
.card.ko { border-color: var(--red); background: var(--red-dim); }

.card-cat {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--hint); margin-bottom: 1.25rem;
}

/* FR — shown first, big for VR */
.card-fr {
  font-size: clamp(22px, 3.5vw, 32px);
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  max-width: 640px;
}

/* NL — revealed */
.card-nl {
  display: none;
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 600;
  color: var(--accent);
  line-height: 1.35;
  margin-top: 1.5rem;
  max-width: 640px;
}
.card-ph {
  display: none;
  font-size: 14px;
  color: var(--muted);
  font-style: italic;
  margin-top: 0.5rem;
}
.reveal-hint {
  font-size: 13px;
  color: var(--hint);
  margin-top: 1.5rem;
}

.card.open .card-nl,
.card.open .card-ph { display: block; }
.card.open .reveal-hint { display: none; }

/* Score buttons */
.sbwrap { display: none; gap: 12px; margin-bottom: 1rem; }
.sbwrap.on { display: flex; }
.sbtn {
  flex: 1; padding: 14px;
  border-radius: 14px; border: none;
  font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  transition: all 0.12s;
}
.sbtn:active { transform: scale(0.97); }
.sbtn-ok { background: var(--green-dim); color: var(--green); border: 1.5px solid var(--green); }
.sbtn-ok:hover { background: var(--green); color: #000; }
.sbtn-ko { background: var(--red-dim); color: var(--red); border: 1.5px solid var(--red); }
.sbtn-ko:hover { background: var(--red); color: #fff; }

/* Speak + Nav */
.spkbtn {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; font-size: 14px; padding: 11px 24px;
  border-radius: 12px; border: 1px solid var(--border);
  background: var(--panel); color: var(--muted);
  cursor: pointer; font-family: inherit;
  margin: 0 auto 1rem; transition: all 0.15s;
}
.spkbtn:hover { color: var(--text); }
.spkbtn.playing { border-color: var(--accent); color: var(--accent); }

.nav { display: flex; gap: 12px; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.nbtn {
  font-size: 14px; padding: 11px 24px;
  border-radius: 12px; border: 1px solid var(--border);
  background: var(--panel); color: var(--text);
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.nbtn:hover { border-color: var(--muted); }
.nbtn:active { transform: scale(0.97); }
.nctr { font-size: 13px; color: var(--muted); }

/* Keyboard */
.kbd { text-align: center; font-size: 11px; color: var(--hint); margin-bottom: 0.5rem; }
kbd { background: var(--panel); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; font-size: 10px; font-family: inherit; }

.empty { text-align: center; padding: 4rem 1rem; color: var(--muted); font-size: 15px; }

/* Focus mode */
body.focus .header,
body.focus .stats,
body.focus .persist,
body.focus .modes { display: none !important; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">🇧🇪 <span>Nederlands</span> Pro</div>
    <div class="header-right">
      <button class="hbtn" id="focusbtn" onclick="toggleFocus()">🎯 Focus VR</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n w" id="sttot">0</div><div class="stat-l">Phrases</div></div>
    <div class="stat"><div class="stat-n g" id="stok">0</div><div class="stat-l">✅ Maîtrisées</div></div>
    <div class="stat"><div class="stat-n r" id="stko">0</div><div class="stat-l">❌ À retravailler</div></div>
  </div>

  <div class="persist">
    <button class="pbtn" onclick="exportScores()">💾 Exporter mes scores</button>
    <label class="pbtn">📂 Importer scores<input type="file" id="score-input" accept=".json" style="display:none"></label>
  </div>

  <div class="modes">
    <button class="mbtn on" id="m-study" onclick="setMode('study')">📇 Flashcards</button>
    <button class="mbtn" id="m-hard" onclick="setMode('hard')">🔥 Difficiles</button>
    <button class="mbtn" id="m-loop" onclick="setMode('loop')">🔁 Boucle auto</button>
    <button class="mbtn" onclick="doShuffle()">🔀 Mélanger</button>
  </div>

  <div class="cats" id="cats"></div>

  <div class="hdbanner" id="hdbanner"></div>

  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
    <div class="prog-lbl" id="proglbl"></div>
  </div>

  <div class="card" id="card" onclick="handleClick()">
    <div class="card-cat" id="ccat"></div>
    <div class="card-fr" id="cfr"></div>
    <div class="reveal-hint">Essaie de le dire… puis clique pour révéler ↓</div>
    <div class="card-nl" id="cnl"></div>
    <div class="card-ph" id="cph"></div>
  </div>

  <div class="sbwrap" id="sbwrap">
    <button class="sbtn sbtn-ko" onclick="score(false)">❌ Je ne savais pas</button>
    <button class="sbtn sbtn-ok" onclick="score(true)">✅ Je savais !</button>
  </div>

  <button class="spkbtn" id="spkbtn" onclick="speakNow()">🔊 Écouter en néerlandais</button>

  <div class="nav">
    <button class="nbtn" onclick="go(-1)">← Précédent</button>
    <span class="nctr" id="nctr">– / –</span>
    <button class="nbtn" onclick="go(1)">Suivant →</button>
  </div>

  <div class="kbd">
    <kbd>Espace</kbd> révéler &nbsp;·&nbsp; <kbd>→</kbd> <kbd>←</kbd> naviguer &nbsp;·&nbsp; <kbd>1</kbd> je savais &nbsp;·&nbsp; <kbd>2</kbd> à retravailler &nbsp;·&nbsp; <kbd>S</kbd> écouter
  </div>

</div>

// ── State ─────────────────────────────────────────────────────
let filtered = [...DATA], idx = 0, mode = 'study', loopTimer = null;
let filteredCat = 'Tout', scores = {}, isOpen = false;
const allCats = ['Tout', ...new Set(DATA.map(p => p.cat))];

// ── Persist ───────────────────────────────────────────────────
const SK = 'nl_vr_scores';
function save() { try { localStorage.setItem(SK, JSON.stringify(scores)); } catch(e){} }
function load() { try { const s = localStorage.getItem(SK); if(s) scores = JSON.parse(s); } catch(e){} }

function exportScores() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(scores,null,2)],{type:'application/json'}));
  a.download = 'scores_vr_phrases.json'; a.click();
}
document.getElementById('score-input').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => { try { scores = JSON.parse(ev.target.result); save(); updateStats(); alert('Scores importés !'); } catch(e){ alert('Fichier invalide.'); }};
  r.readAsText(f);
});

// ── Cats ──────────────────────────────────────────────────────
function renderCats() {
  const el = document.getElementById('cats');
  el.innerHTML = allCats.map(c =>
    `<button class="cbtn${c===filteredCat?' on':''}" data-c="${c.replace(/"/g,'&quot;')}">${c}</button>`
  ).join('');
  el.querySelectorAll('.cbtn').forEach(b =>
    b.addEventListener('click', () => { filteredCat = b.dataset.c; applyFilter(); })
  );
}

function applyFilter() {
  const base = filteredCat==='Tout' ? [...DATA] : DATA.filter(p=>p.cat===filteredCat);
  filtered = mode==='hard' ? base.filter(p=>scores[p.nl]===false) : base;
  idx = 0; renderCats(); render(); updateHardBanner();
}

// ── Render ────────────────────────────────────────────────────
function render() {
  isOpen = false;
  const card = document.getElementById('card');
  card.classList.remove('open','ok','ko');
  document.getElementById('sbwrap').classList.remove('on');

  if (!filtered.length) {
    document.getElementById('cfr').textContent = mode==='hard' ? '🎉 Aucune phrase difficile !' : 'Aucune phrase dans cette catégorie.';
    document.getElementById('cnl').textContent = '';
    document.getElementById('cph').textContent = '';
    document.getElementById('ccat').textContent = '';
    document.getElementById('nctr').textContent = '0 / 0';
    document.getElementById('prog').style.width = '0%';
    document.getElementById('proglbl').textContent = '';
    return;
  }

  const p = filtered[idx];
  document.getElementById('ccat').textContent = p.cat;
  document.getElementById('cfr').textContent = p.fr;
  document.getElementById('cnl').textContent = p.nl;
  document.getElementById('cph').textContent = p.ph ? '/ ' + p.ph + ' /' : '';
  document.getElementById('nctr').textContent = `${idx+1} / ${filtered.length}`;
  const pct = Math.round(((idx+1)/filtered.length)*100);
  document.getElementById('prog').style.width = pct+'%';
  document.getElementById('proglbl').textContent = `${idx+1} sur ${filtered.length} — ${pct}%`;
}

function handleClick() {
  if (!filtered.length || isOpen) return;
  isOpen = true;
  document.getElementById('card').classList.add('open');
  document.getElementById('sbwrap').classList.add('on');
  speakNow();
}

// ── Score ─────────────────────────────────────────────────────
function score(knew) {
  if (!filtered.length) return;
  scores[filtered[idx].nl] = knew;
  save(); updateStats();
  document.getElementById('card').classList.add(knew?'ok':'ko');
  setTimeout(() => {
    if (mode==='hard') {
      filtered = filtered.filter(p=>scores[p.nl]===false);
      if (idx>=filtered.length) idx = Math.max(0,filtered.length-1);
      updateHardBanner();
    }
    go(1);
  }, 600);
}

function updateStats() {
  const v = Object.values(scores);
  document.getElementById('stok').textContent = v.filter(x=>x===true).length;
  document.getElementById('stko').textContent = v.filter(x=>x===false).length;
  document.getElementById('sttot').textContent = DATA.length;
}

function updateHardBanner() {
  const el = document.getElementById('hdbanner');
  if (mode==='hard') {
    const n = DATA.filter(p=>scores[p.nl]===false).length;
    el.textContent = `🔥 Mode difficiles — ${n} phrase${n>1?'s':''} à retravailler`;
    el.classList.add('on');
  } else { el.classList.remove('on'); }
}

// ── Nav ───────────────────────────────────────────────────────
function go(dir) {
  if (!filtered.length) return;
  idx = (idx+dir+filtered.length)%filtered.length;
  render();
}

function doShuffle() {
  if (loopTimer) { clearInterval(loopTimer); loopTimer=null; }
  mode='study'; ['study','hard','loop'].forEach(m=>{ const el=document.getElementById('m-'+m); if(el) el.classList.toggle('on',m==='study'); });
  for (let i=filtered.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [filtered[i],filtered[j]]=[filtered[j],filtered[i]];
  }
  idx=0; render();
}

// ── Speech ────────────────────────────────────────────────────
function speakNow() {
  if (!filtered.length) return;
  const btn = document.getElementById('spkbtn');
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(filtered[idx].nl);
  utt.lang='nl-NL'; utt.rate=0.82;
  btn.classList.add('playing');
  utt.onend = ()=>btn.classList.remove('playing');
  utt.onerror = ()=>btn.classList.remove('playing');
  window.speechSynthesis.speak(utt);
}

// ── Modes ─────────────────────────────────────────────────────
function setMode(m) {
  mode=m;
  if (loopTimer) { clearInterval(loopTimer); loopTimer=null; }
  ['study','hard','loop'].forEach(id=>{ const el=document.getElementById('m-'+id); if(el) el.classList.toggle('on',id===m); });
  applyFilter();
  if (m==='loop') {
    speakNow();
    loopTimer = setInterval(()=>{ go(1); setTimeout(speakNow,600); }, 5500);
  }
}

// ── Focus ─────────────────────────────────────────────────────
function toggleFocus() {
  document.body.classList.toggle('focus');
  const btn = document.getElementById('focusbtn');
  btn.textContent = document.body.classList.contains('focus') ? '✕ Quitter focus' : '🎯 Focus VR';
  btn.classList.toggle('on', document.body.classList.contains('focus'));
}

// ── Keyboard ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (tag==='INPUT'||tag==='TEXTAREA') return;
  if (e.key===' '||e.key==='Enter') { e.preventDefault(); handleClick(); }
  else if (e.key==='ArrowRight') go(1);
  else if (e.key==='ArrowLeft') go(-1);
  else if (e.key==='1') score(true);
  else if (e.key==='2') score(false);
  else if (e.key==='s'||e.key==='S') speakNow();
});

// ── Init ──────────────────────────────────────────────────────
load(); renderCats(); applyFilter(); updateStats();
</script>
